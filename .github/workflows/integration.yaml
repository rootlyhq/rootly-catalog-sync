name: Integration Tests

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  integration:
    name: Integration
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      RUN_ID: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go build -o rootly-catalog-sync ./cmd/rootly-catalog-sync
      - name: Integration — catalog entities
        env:
          ROOTLY_API_KEY: ${{ secrets.INTEGRATION_API_KEY }}
        run: |
          set -euo pipefail
          stamp() { sed -i "s/__RUN__/$RUN_ID/g" "$1"; }

          # Setup
          mkdir -p catalog
          cat > rootly-catalog-sync.yaml <<'EOF'
          version: 1
          sync_id: ci-integration-test-__RUN__
          pipelines:
            - sources:
                - local:
                    files: ["catalog/*.yaml"]
              outputs:
                - catalog: "CI Integration Test __RUN__"
                  external_id: "{{ .id }}"
                  name: "{{ .name }}"
                  fields:
                    tier: "{{ .tier }}"
          EOF
          stamp rootly-catalog-sync.yaml

          cat > catalog/services.yaml <<'EOF'
          - id: ci-svc-1-__RUN__
            name: CI Test Service A __RUN__
            tier: "1"
          - id: ci-svc-2-__RUN__
            name: CI Test Service B __RUN__
            tier: "2"
          EOF
          stamp catalog/services.yaml

          # Doctor
          ./rootly-catalog-sync doctor
          echo "✓ doctor"

          # Validate
          ./rootly-catalog-sync validate
          echo "✓ validate"

          # Plan
          ./rootly-catalog-sync plan
          echo "✓ plan"

          # Sync (create)
          ./rootly-catalog-sync sync
          echo "✓ sync (create)"

          # Status (should be in sync)
          ./rootly-catalog-sync status --fail-on-drift && echo "✓ status (in sync)"

          # JSON output
          ./rootly-catalog-sync status --output=json | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['counts']['Noop']==2, f'expected 2 noops, got {d}'"
          echo "✓ json output"

          # Re-sync (idempotent)
          OUTPUT=$(./rootly-catalog-sync sync 2>&1)
          echo "$OUTPUT" | grep -q "Already in sync"
          echo "✓ idempotent re-sync"

          # Update
          cat > catalog/services.yaml <<'EOF'
          - id: ci-svc-1-__RUN__
            name: CI Test Service A Updated __RUN__
            tier: "0"
          - id: ci-svc-2-__RUN__
            name: CI Test Service B __RUN__
            tier: "2"
          EOF
          stamp catalog/services.yaml
          ./rootly-catalog-sync sync
          echo "✓ sync (update)"

          # Prune
          cat > catalog/services.yaml <<'EOF'
          - id: ci-svc-1-__RUN__
            name: CI Test Service A Updated __RUN__
            tier: "0"
          EOF
          stamp catalog/services.yaml
          ./rootly-catalog-sync sync --allow-prune --prune-threshold=1.0
          echo "✓ sync (prune)"

          # Cleanup — delete all
          cat > catalog/services.yaml <<'EOF'
          []
          EOF
          # Empty source should abort — verify safety guard
          ./rootly-catalog-sync sync --allow-prune 2>&1 | grep -q "empty source" && echo "✓ empty source safety"

          # Explain
          ./rootly-catalog-sync explain ci-svc-1-$RUN_ID | grep -q "noop" && echo "✓ explain"

          # Plan freshness — create plan, change source, apply should detect stale
          cat > catalog/services.yaml <<'EOF'
          - id: ci-svc-1-__RUN__
            name: CI Test Service A Updated __RUN__
            tier: "0"
          EOF
          stamp catalog/services.yaml
          ./rootly-catalog-sync plan
          # Change source behind plan's back
          cat > catalog/services.yaml <<'EOF'
          - id: ci-svc-1-__RUN__
            name: CI Test Service A Changed Again __RUN__
            tier: "0"
          EOF
          stamp catalog/services.yaml
          ./rootly-catalog-sync sync
          # Now try to apply the OLD plan — should warn about staleness
          ./rootly-catalog-sync apply .rootly-catalog-sync-plan-*.json 2>&1 | grep -q "stale\|Nothing to do" && echo "✓ plan freshness"

          echo ""
          echo "=== All catalog entity integration tests passed ==="

      - name: Integration — native services
        env:
          ROOTLY_API_KEY: ${{ secrets.INTEGRATION_API_KEY }}
        run: |
          set -euo pipefail
          stamp() { sed -i "s/__RUN__/$RUN_ID/g" "$1"; }

          cat > rootly-catalog-sync.yaml <<'EOF'
          version: 2
          sync:
            - from:
                inline:
                  entries:
                    - id: ci-native-svc-1-__RUN__
                      name: CI Native Service A __RUN__
                      description: Integration test service
                    - id: ci-native-svc-2-__RUN__
                      name: CI Native Service B __RUN__
                      description: Second test service
              to: service
              map:
                external_id: "{{ .id }}"
                name: "{{ .name }}"
                description: "{{ .description }}"
          EOF
          stamp rootly-catalog-sync.yaml

          ./rootly-catalog-sync sync
          echo "✓ native service create"
          ./rootly-catalog-sync status --fail-on-drift && echo "✓ native service in sync"
          OUTPUT=$(./rootly-catalog-sync sync 2>&1)
          echo "$OUTPUT" | grep -q "Already in sync" && echo "✓ native service idempotent"

          # JSON output
          ./rootly-catalog-sync status --output=json | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['counts']['Noop']==2"
          echo "✓ native service json output"

          # Update
          cat > rootly-catalog-sync.yaml <<'EOF'
          version: 2
          sync:
            - from:
                inline:
                  entries:
                    - id: ci-native-svc-1-__RUN__
                      name: CI Native Service A Updated __RUN__
                      description: Updated description
                    - id: ci-native-svc-2-__RUN__
                      name: CI Native Service B __RUN__
                      description: Second test service
              to: service
              map:
                external_id: "{{ .id }}"
                name: "{{ .name }}"
                description: "{{ .description }}"
          EOF
          stamp rootly-catalog-sync.yaml

          ./rootly-catalog-sync sync
          echo "✓ native service update"

          # Prune
          cat > rootly-catalog-sync.yaml <<'EOF'
          version: 2
          sync:
            - from:
                inline:
                  entries:
                    - id: ci-native-svc-1-__RUN__
                      name: CI Native Service A Updated __RUN__
                      description: Updated description
              to: service
              map:
                external_id: "{{ .id }}"
                name: "{{ .name }}"
                description: "{{ .description }}"
          EOF
          stamp rootly-catalog-sync.yaml

          ./rootly-catalog-sync sync --allow-prune --prune-threshold=1.0
          echo "✓ native service prune"

          # Explain
          ./rootly-catalog-sync explain ci-native-svc-1-$RUN_ID | grep -q "noop" && echo "✓ native service explain"

          echo "=== native services passed ==="

      - name: Integration — native functionalities
        env:
          ROOTLY_API_KEY: ${{ secrets.INTEGRATION_API_KEY }}
        run: |
          set -euo pipefail
          stamp() { sed -i "s/__RUN__/$RUN_ID/g" "$1"; }

          cat > rootly-catalog-sync.yaml <<'EOF'
          version: 2
          sync:
            - from:
                inline:
                  entries:
                    - id: ci-native-func-1-__RUN__
                      name: CI Checkout Flow __RUN__
                      description: Integration test functionality
                    - id: ci-native-func-2-__RUN__
                      name: CI User Auth __RUN__
                      description: Second test functionality
              to: functionality
              map:
                external_id: "{{ .id }}"
                name: "{{ .name }}"
                description: "{{ .description }}"
          EOF
          stamp rootly-catalog-sync.yaml

          ./rootly-catalog-sync sync
          echo "✓ native functionality create"
          ./rootly-catalog-sync status --fail-on-drift && echo "✓ native functionality in sync"
          OUTPUT=$(./rootly-catalog-sync sync 2>&1)
          echo "$OUTPUT" | grep -q "Already in sync" && echo "✓ native functionality idempotent"
          echo "=== native functionalities passed ==="

      - name: Integration — native environments
        env:
          ROOTLY_API_KEY: ${{ secrets.INTEGRATION_API_KEY }}
        run: |
          set -euo pipefail
          stamp() { sed -i "s/__RUN__/$RUN_ID/g" "$1"; }

          cat > rootly-catalog-sync.yaml <<'EOF'
          version: 2
          sync:
            - from:
                inline:
                  entries:
                    - id: ci-native-env-1-__RUN__
                      name: CI Staging __RUN__
                      description: Integration test environment
                    - id: ci-native-env-2-__RUN__
                      name: CI Production __RUN__
                      description: Second test environment
              to: environment
              map:
                external_id: "{{ .id }}"
                name: "{{ .name }}"
                description: "{{ .description }}"
          EOF
          stamp rootly-catalog-sync.yaml

          ./rootly-catalog-sync sync
          echo "✓ native environment create"
          ./rootly-catalog-sync status --fail-on-drift && echo "✓ native environment in sync"
          OUTPUT=$(./rootly-catalog-sync sync 2>&1)
          echo "$OUTPUT" | grep -q "Already in sync" && echo "✓ native environment idempotent"

          # Sentinel guard — empty source should refuse to delete all
          cat > rootly-catalog-sync.yaml <<'EOF'
          version: 2
          sync:
            - from:
                inline:
                  entries: []
              to: environment
              map:
                external_id: "{{ .id }}"
                name: "{{ .name }}"
          EOF
          ./rootly-catalog-sync sync --allow-prune 2>&1 | grep -q "at least\|empty source" && echo "✓ environment sentinel guard"

          echo "=== native environments passed ==="

      - name: Integration — native teams
        env:
          ROOTLY_API_KEY: ${{ secrets.INTEGRATION_API_KEY }}
        run: |
          set -euo pipefail
          stamp() { sed -i "s/__RUN__/$RUN_ID/g" "$1"; }

          cat > rootly-catalog-sync.yaml <<'EOF'
          version: 2
          sync:
            - from:
                inline:
                  entries:
                    - id: ci-native-team-1-__RUN__
                      name: CI Platform Team __RUN__
                      description: Integration test team
                    - id: ci-native-team-2-__RUN__
                      name: CI Security Team __RUN__
                      description: Second test team
              to: team
              map:
                external_id: "{{ .id }}"
                name: "{{ .name }}"
                description: "{{ .description }}"
          EOF
          stamp rootly-catalog-sync.yaml

          ./rootly-catalog-sync sync
          echo "✓ native team create"
          ./rootly-catalog-sync status --fail-on-drift && echo "✓ native team in sync"
          OUTPUT=$(./rootly-catalog-sync sync 2>&1)
          echo "$OUTPUT" | grep -q "Already in sync" && echo "✓ native team idempotent"
          echo "=== native teams passed ==="
