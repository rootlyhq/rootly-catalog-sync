version: 2

builds:
  - main: ./cmd/rootly-catalog-sync
    binary: rootly-catalog-sync
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: rootlyhq
      name: homebrew-tap
    homepage: https://github.com/rootlyhq/rootly-catalog-sync
    description: Sync external catalog data into Rootly
    install: |
      bin.install "rootly-catalog-sync"

dockers:
  - image_templates:
      - "rootlyhq/rootly-catalog-sync:{{ .Version }}-amd64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    goarch: amd64
  - image_templates:
      - "rootlyhq/rootly-catalog-sync:{{ .Version }}-arm64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    goarch: arm64

docker_manifests:
  - name_template: "rootlyhq/rootly-catalog-sync:{{ .Version }}"
    image_templates:
      - "rootlyhq/rootly-catalog-sync:{{ .Version }}-amd64"
      - "rootlyhq/rootly-catalog-sync:{{ .Version }}-arm64"
  - name_template: "rootlyhq/rootly-catalog-sync:latest"
    image_templates:
      - "rootlyhq/rootly-catalog-sync:{{ .Version }}-amd64"
      - "rootlyhq/rootly-catalog-sync:{{ .Version }}-arm64"
