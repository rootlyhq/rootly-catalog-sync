version: 2

project_name: rootly-catalog-sync

builds:
  - main: ./cmd/rootly-catalog-sync
    binary: rootly-catalog-sync
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
    flags:
      - -trimpath
    mod_timestamp: "{{.CommitTimestamp}}"

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

brews:
  - name: rootly-catalog-sync
    ids: [default]
    repository:
      owner: rootlyhq
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/rootlyhq/rootly-catalog-sync"
    description: "Sync external catalog data into Rootly"
    install: |
      bin.install "rootly-catalog-sync"
    test: |
      system "#{bin}/rootly-catalog-sync", "version"

release:
  github:
    owner: rootlyhq
    name: rootly-catalog-sync
  draft: false
  prerelease: auto
  mode: replace
  name_template: "v{{ .Version }}"
